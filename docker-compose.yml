services:
  librairy:
    build:
      context: .
      dockerfile: Dockerfile
    image: librairy:latest
    container_name: librairy
    env_file:
      - path: .env
        required: false
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
    volumes:
      - ${HOST_INBOX_DIR:-./data/inbox}:/data/inbox
      - ${HOST_LIBRARY_DIR:-./data/library}:/data/library
      - ${HOST_QUARANTINE_DIR:-./data/quarantine}:/data/quarantine
      - ${HOST_APPDATA_DIR:-./data/appdata}:/data/appdata
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    command: ["librairy", "run"]
