{% extends "base.html" %}
{% block content %}
  <h1>Dashboard</h1>
  <form class="search-hero" action="/search" method="get" role="search">
    <input type="search" name="q" placeholder="Search your library — e.g. queen night opera" aria-label="Search your library" autofocus>
    <button class="btn-primary" type="submit">Search</button>
  </form>
  <div id="dashboard-stats" hx-get="/dashboard/stats" hx-trigger="every 5s" hx-swap="outerHTML">
    {% include "partials/dashboard_stats.html" %}
  </div>
{% endblock %}
